@if (modalService.isOpen()) {
  <div class="modal-backdrop" (click)="close()"></div>

  <div class="modal" role="dialog" aria-modal="true">

    <!-- Header -->
    <div class="modal-header">
      <div class="modal-title-wrap">
        <div class="modal-title-icon">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none">
            <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm1 14.5v1c0 .55-.45 1-1 1s-1-.45-1-1v-1.08c-1.12-.26-2-.97-2.29-2.09-.11-.42.22-.83.65-.83h.28c.31 0 .57.21.65.51.16.59.69 1 1.37 1.09V13.1l-.67-.19c-1.07-.31-1.88-1.16-1.88-2.36 0-1.4 1.1-2.34 2.55-2.5V7c0-.55.45-1 1-1s1 .45 1 1v1.04c.96.21 1.73.84 2.03 1.72.14.4-.17.81-.59.81h-.32c-.29 0-.55-.19-.64-.47-.14-.44-.54-.77-1.01-.87v1.95l.62.17c1.23.33 2.03 1.17 2.03 2.48 0 1.44-1.06 2.37-2.62 2.57z" fill="currentColor"/>
          </svg>
        </div>
        <div>
          <h2 class="modal-title">{{ isEditing() ? 'Edit Transaction' : 'New Transaction' }}</h2>
          <p class="modal-subtitle">{{ isEditing() ? 'Update the transaction details' : 'Fill in the details below' }}</p>
        </div>
      </div>
      <button class="close-btn" (click)="close()" aria-label="Close">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none">
          <path d="M18 6L6 18M6 6l12 12" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"/>
        </svg>
      </button>
    </div>

    <!-- Type Toggle -->
    <div class="type-toggle-wrap">
      <div class="type-toggle">
        <button
          class="toggle-btn"
          [class.active-expense]="formValue.type === 'expense'"
          (click)="updateField('type', 'expense')">
          <span class="toggle-icon expense-icon">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none">
              <path d="M12 5v14M5 12l7 7 7-7" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
          </span>
          Expense
        </button>
        <button
          class="toggle-btn"
          [class.active-income]="formValue.type === 'income'"
          (click)="updateField('type', 'income')">
          <span class="toggle-icon income-icon">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none">
              <path d="M12 19V5M5 12l7-7 7 7" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
          </span>
          Income
        </button>
      </div>
    </div>

    <!-- Form Body -->
    <div class="modal-body">

      <!-- Title -->
      <div class="field-group">
        <label class="field-label">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none">
            <path d="M4 6h16M4 12h16M4 18h7" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
          </svg>
          Title
        </label>
        <input
          class="field-input"
          type="text"
          placeholder="e.g. Monthly Rent, Freelance Payment..."
          [value]="formValue.title"
          (input)="updateField('title', $any($event.target).value)" />
      </div>

      <!-- Amount -->
      <div class="field-group">
        <label class="field-label">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none">
            <path d="M12 1v22M17 5H9.5a3.5 3.5 0 000 7h5a3.5 3.5 0 010 7H6" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
          </svg>
          Amount
        </label>
        <div class="amount-input-wrap">
          <span class="amount-prefix">$</span>
          <input
            class="field-input amount-input"
            type="number"
            placeholder="0.00"
            min="0"
            step="0.01"
            [value]="formValue.amount ?? ''"
            (input)="updateField('amount', $any($event.target).valueAsNumber)" />
        </div>
      </div>

      <!-- Category + Date Row -->
      <div class="field-row">
        <div class="field-group">
          <label class="field-label">
            <svg width="13" height="13" viewBox="0 0 24 24" fill="none">
              <path d="M4 6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2V6zM14 6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2V6zM4 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2v-2zM14 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2v-2z" stroke="currentColor" stroke-width="1.75"/>
            </svg>
            Category
          </label>
          <div class="select-wrap">
            <select
              class="field-input field-select"
              [value]="formValue.category"
              (change)="updateField('category', $any($event.target).value)">
              <option value="" disabled>Select category</option>
              @for (cat of categories(); track cat) {
                <option [value]="cat">{{ cat }}</option>
              }
            </select>
            <span class="select-arrow">
              <svg width="12" height="12" viewBox="0 0 24 24" fill="none">
                <path d="M6 9l6 6 6-6" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
              </svg>
            </span>
          </div>
        </div>

        <div class="field-group">
          <label class="field-label">
            <svg width="13" height="13" viewBox="0 0 24 24" fill="none">
              <rect x="3" y="4" width="18" height="18" rx="2" stroke="currentColor" stroke-width="1.75"/>
              <path d="M16 2v4M8 2v4M3 10h18" stroke="currentColor" stroke-width="1.75" stroke-linecap="round"/>
            </svg>
            Date
          </label>
          <input
            class="field-input"
            type="date"
            [value]="formValue.date"
            (change)="updateField('date', $any($event.target).value)" />
        </div>
      </div>

      <!-- Note -->
      <div class="field-group">
        <label class="field-label">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none">
            <path d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
          Note
          <span class="field-optional">optional</span>
        </label>
        <input
          class="field-input"
          type="text"
          placeholder="Add a short note..."
          [value]="formValue.note"
          (input)="updateField('note', $any($event.target).value)" />
      </div>

    </div>

    <!-- Footer -->
    <div class="modal-footer">
      <button class="footer-btn cancel-btn" (click)="close()">Cancel</button>
      <button
        class="footer-btn submit-btn"
        [class.disabled]="!formValue.title || !formValue.amount || !formValue.category"
        [disabled]="!formValue.title || !formValue.amount || !formValue.category"
        (click)="submit()">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none">
          <path d="M20 6L9 17l-5-5" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
        {{ isEditing() ? 'Save Changes' : 'Add Transaction' }}
      </button>
    </div>

  </div>
}
